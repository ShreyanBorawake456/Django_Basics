{% extends "base.html" %}

{% block start %}


<div class="container mt-5">
<form class = "col-6 mx-auto card p-3 shadow-ig" method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <h2> Add Recipe</h2>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Recipe name</label>
    <input name="recipe_name" required type="text" class="form-control">
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Recipe description</label>
    <textarea class = "form-control" name="recipe_description" required></textarea>
  </div>

    <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Recipe image </label>
    <input  name="recipe_image" type="file" class="form-control">
  </div>
<button type="submit" class="btn btn-primary">Add Recipe</button>
  
</form>
<div class="mt-5">
<div class="mx-auto col-6">
  <form>
    
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Search Food</label>
    <input name="search" value="{{ recipe.recipe_name }}" type="text" class="form-control">

    </div>
      <button type="submit" class="btn btn-primary">Search</button>
</form>
</div>

</div>

    <table class="table mt-5" >
  <thead>
    <tr>
      <th scope="col">No.</th>
      <th scope="col">Recipe name</th>
      <th scope="col">Recipe description</th>
      <th scope="col">Image</th>
      <th scope="col">Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for recipe in recipes %}
    <tr>
      <th scope="row">{{ forloop.counter }}</th>
      <td>{{ recipe.recipe_name }}</td>
      <td>{{ recipe.recipe_description }}</td>
      <td>
        <img src="/media/{{ recipe.recipe_image }}" style ="height:200px"></td>

    <td>
        <a href="/delete-recipe/{{ recipe.id }}/" class="btn btn-danger m-2">Delete</a>
        <a href="/update-recipe/{{ recipe.id }}/" class="btn btn-success">Update</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

</div>


</div>

{% endblock %}
<div class="container mt-5">
